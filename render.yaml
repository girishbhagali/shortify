services:
  # Backend API Service (FastAPI)
  - type: web
    name: shortify-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: BASE_URL
        # Update this to your deployed backend URL once known
        value: https://shortify-backend.onrender.com
      - key: ALLOWED_ORIGINS
        # Update this to your Vercel URL once deployed
        sync: false
      - key: DATABASE_URL
        # Set this to your Supabase PostgreSQL connection URI in Render Dashboard
        sync: false
